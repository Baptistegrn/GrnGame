name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            runner: ubuntu-22.04
            platform: linux-x64
            buildtype: debug
            embed: false

          - os: ubuntu-22.04
            runner: ubuntu-22.04
            platform: linux-x64
            buildtype: release
            embed: false

          - os: ubuntu-22.04
            runner: ubuntu-22.04
            platform: linux-x64
            buildtype: release
            embed: true

          - os: ubuntu-22.04-arm
            runner: ubuntu-22.04-arm
            platform: linux-arm64
            buildtype: debug
            embed: false

          - os: ubuntu-22.04-arm
            runner: ubuntu-22.04-arm
            platform: linux-arm64
            buildtype: release
            embed: false

          - os: ubuntu-22.04-arm
            runner: ubuntu-22.04-arm
            platform: linux-arm64
            buildtype: release
            embed: true

          - os: macos-latest
            runner: macos-latest
            platform: macos-arm64
            buildtype: debug
            embed: false

          - os: macos-latest
            runner: macos-latest
            platform: macos-arm64
            buildtype: release
            embed: false

          - os: macos-latest
            runner: macos-latest
            platform: macos-arm64
            buildtype: release
            embed: true

          - os: macos-15-intel
            runner: macos-15-intel
            platform: macos-x64
            buildtype: debug
            embed: false

          - os: macos-15-intel
            runner: macos-15-intel
            platform: macos-x64
            buildtype: release
            embed: false

          - os: macos-15-intel
            runner: macos-15-intel
            platform: macos-x64
            buildtype: release
            embed: true

          - os: windows-latest
            runner: windows-latest
            platform: windows-x64
            buildtype: debug
            embed: false

          - os: windows-latest
            runner: windows-latest
            platform: windows-x64
            buildtype: release
            embed: false

          - os: windows-latest
            runner: windows-latest
            platform: windows-x64
            buildtype: release
            embed: true

          - os: windows-11-arm
            runner: windows-11-arm
            platform: windows-arm64
            buildtype: debug
            embed: false

          - os: windows-11-arm
            runner: windows-11-arm
            platform: windows-arm64
            buildtype: release
            embed: false

          - os: windows-11-arm
            runner: windows-11-arm
            platform: windows-arm64
            buildtype: release
            embed: true

    runs-on: ${{ matrix.runner }}

    name: "${{ matrix.platform }} | ${{ matrix.buildtype }} | embed=${{ matrix.embed }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: '.xmake-cache-v2'
          package-cache: true
          build-cache: true

      - name: Remove homebrew freetype
        if: runner.os == 'macOS'
        run: brew uninstall --ignore-dependencies freetype

      - name: Configure
        run: >
          xmake config --clean
          -m ${{ matrix.buildtype }}
          -y -vv
          --embed_assets=${{ matrix.embed }}

      - name: Build
        run: xmake build -y -vv

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.platform }}-${{ matrix.buildtype }}-embed${{ matrix.embed }}"
          path: build/*/*/${{ matrix.buildtype }}/

  build-wasm:
    runs-on: ubuntu-22.04

    name: "wasm | release | embed=true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: '.xmake-cache-v2'
          package-cache: true
          build-cache: true

      - name: Setup emsdk
        uses: mymindstorm/setup-emsdk@v14

      - name: Configure
        run: >
          xmake f -p wasm -c
          -y -vv
          --embed_assets=y

      - name: Build
        run: xmake build -y -vv

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "wasm-release-embedtrue"
          path: build/*/*/release/

  release:
    name: Create GitHub Release
    needs: [build, build-wasm]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package artifacts per model
        shell: bash
        run: |
          mkdir -p release-assets

          package() {
            local platform="$1"   # ex: linux-x64
            local embed="$2"      # true | false
            local tag="${GITHUB_REF_NAME}"

            local suffix
            suffix=$([ "$embed" = "true" ] && echo "embedded" || echo "standalone")
            local archive="release-assets/${platform}-${suffix}-${tag}.zip"

            local src="artifacts/${platform}-release-embed${embed}"

            if [ -d "$src" ]; then
              echo "Packaging $src → $archive"
              cd "$src"
              zip -r "../../${archive}" .
              cd - > /dev/null
            else
              echo "Skipping missing: $src"
            fi
          }

          for platform in linux-x64 linux-arm64 macos-arm64 macos-x64 windows-x64 windows-arm64; do
            package "$platform" "true"
            package "$platform" "false"
          done

          mkdir -p artifacts/wasm-release-embedtrue
          if [ -d "artifacts/wasm-release-embedtrue" ]; then
            tag="${GITHUB_REF_NAME}"
            archive="release-assets/wasm-embedded-${tag}.zip"
            src="artifacts/wasm-release-embedtrue"
            echo "Packaging $src → $archive"
            cd "$src"
            zip -r "../../${archive}" .
            cd - > /dev/null
          else
            echo "Skipping missing: artifacts/wasm-release-embedtrue"
          fi

          echo "── Contents of release-assets/ ──"
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}   
          generate_release_notes: true
          files: release-assets/*.zip