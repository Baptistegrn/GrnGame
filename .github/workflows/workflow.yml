name: Build

on:
  - push
  - pull_request

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
        buildtype: [release]
        arch: [x64] 
        include:
          - os: windows-latest
            buildtype: release
            arch: x86
          - os: windows-latest
            buildtype: release
            arch: x86
          - os: windows-latest
            buildtype: release
            arch: arm64
          - os: windows-latest
            buildtype: release
            arch: arm64
          - os: macos-latest
            buildtype: release
            arch: x86_64
          - os: macos-latest
            buildtype: release
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: '.xmake-cache-v2'
          package-cache: true
          build-cache: true

      - name: Configure
        run: xmake config -a ${{ matrix.arch }} -m ${{ matrix.buildtype }} -y -vv

      - name: Build
        run: xmake build -y -vv

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.buildtype }}
          path: build/*/*/${{ matrix.buildtype }}/
