name: Build

on:
  - push
  - pull_request

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
        buildtype: [debug, release]
        arch: [x64, x86]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: '.xmake-cache-v2'
          package-cache: true
          build-cache: true

      - name: Configure
        if: matrix.os != 'windows-latest'
        run: xmake config -m ${{ matrix.buildtype }} -a ${{ matrix.arch }} -y -vv

      - name: Configure (MSVC)
        if: matrix.os == 'windows-latest'
        run: xmake config -m ${{ matrix.buildtype }} -a ${{ matrix.arch }} -y -vv
        
      - name: Configure (MinGW)
        if: matrix.os == 'windows-latest'
        run: xmake config --toolchain=mingw -m ${{ matrix.buildtype }} -a ${{ matrix.arch }} -y -vv

      - name: Build
        run: xmake build -y -vv

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.buildtype }}
          path: build/*/*/${{ matrix.buildtype }}/