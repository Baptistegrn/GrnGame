name: Build

on:
  - push
  - pull_request

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
        buildtype: [debug, release]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: '.xmake-cache-v2'
          package-cache: true
          build-cache: true

      - name: Remove homebrew freetype
        if: runner.os == 'macOS'
        run: brew uninstall --ignore-dependencies freetype

      - name: Clean packages
        run: xmake require --clean -y

      - name: Configure
        run: xmake config -m ${{ matrix.buildtype }} -y -vv

      - name: Build
        run: xmake build -y -vv

      - name: Build embedded-asset tool
        run: xmake build -C embedded embedded-asset -y -vv

      - name: Upload main artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.buildtype }}
          path: build/*/*/${{ matrix.buildtype }}/

      - name: Upload embedded-asset tool
        uses: actions/upload-artifact@v4
        with:
          name: embedded-asset-${{ matrix.os }}-${{ matrix.buildtype }}
          path: embedded/*/Embedded*